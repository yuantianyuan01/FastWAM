# @package _global_

defaults:
  - override /data: libero_2cam
  - override /model: causalwam_idm
  - _self_

# dataloading
batch_size: 2
num_workers: 4

model:
  mot_checkpoint_mixed_attn: false

# scheduler
lr_scheduler_type: "cosine"
num_epochs: 10
max_steps: 20
log_every: 1
save_every: 0   # 0 = disable checkpointing during debugging
eval_every: 1   # 
eval_num_samples: 1

# training
gradient_accumulation_steps: 1
weight_decay: 1e-2
resume: null
