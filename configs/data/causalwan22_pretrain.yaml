train:
  _target_: fastwam.datasets.oxe.oxe_robot_video_dataset.OXEPretrainDataset
  data_dir: ./data/datasets
  data_mix: droid
  num_frames: 33
  frame_size: [224, 224]
  shuffle_buffer_size: 512
  image_aug: true
  load_camera_views: ["primary", "wrist"]
  text_embedding_cache_dir: "./data/cache/droid"
  context_len: 128
  is_training_set: true
  action_video_freq_ratio: 4
  concat_multi_camera: "horizontal"
  override_instruction: null
  traj_read_threads: 4
  traj_transform_threads: 4

val:
  _target_: fastwam.datasets.oxe.oxe_robot_video_dataset.OXEPretrainDataset
  data_dir: ./data/datasets
  data_mix: bridge_orig
  num_frames: 33
  frame_size: [224, 224]
  # NOTE: when is_training_set=false, make_pretrain_dataset does
  # `dataset.take(shuffle_buffer_size).cache()`, so this value acts as the
  # effective validation set size (in frames), not just a shuffle buffer.
  shuffle_buffer_size: 512
  image_aug: false
  load_camera_views: ["primary", "secondary"]
  text_embedding_cache_dir: "./data/cache/bridge"
  context_len: 128
  is_training_set: false
  action_video_freq_ratio: 4
  concat_multi_camera: "horizontal"
  override_instruction: null
  traj_read_threads: 4
  traj_transform_threads: 4
